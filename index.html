<!DOCTYPE html>
<html>
<head>
  <title>Territory Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<div id="loginScreen" class="login">
  <h2>Enter Your Name</h2>
  <input id="usernameInput" placeholder="Your name"/>
  <button onclick="saveUser()">Start Game</button>
</div>

<div id="map"></div>

<div class="status" id="status">Idle</div>

<div class="panel">

  <div class="buttons">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div class="stats">
    <div>📍 <span id="distance">0</span> km</div>
    <div>🟩 <span id="area">0</span> km²</div>
    <div>🔥 <span id="streak">0</span></div>
  </div>

  <div class="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <ul id="leaderboard"></ul>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
