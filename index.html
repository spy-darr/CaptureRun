<!DOCTYPE html>
<html>
<head>
  <title>Territory Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login">
  <div class="login-card">
    <h2>Welcome</h2>
    <p>Claim your territory</p>

    <input id="usernameInput" placeholder="Enter your name"/>

    <button onclick="saveUser()" class="primary-btn">
      Start Running
    </button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- STATUS -->
<div class="status" id="status">Idle</div>

<!-- PANEL -->
<div class="panel">

  <div class="buttons">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div class="stats">
    <div>📍 <span id="distance">0</span> km</div>
    <div>🟩 <span id="area">0</span> km²</div>
    <div>🔥 <span id="streak">0</span></div>
  </div>

  <div class="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <ul id="leaderboard"></ul>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
