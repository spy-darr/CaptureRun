<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080a10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Territory Runner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root {
  --bg:       #080a10;
  --surface:  #0f1118;
  --surface2: #161923;
  --border:   #1c2035;
  --accent:   #00ff88;
  --accent2:  #ff3d5a;
  --accent3:  #3d7fff;
  --warning:  #ffaa00;
  --text:     #e2e6f0;
  --muted:    #4a5370;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top:    env(safe-area-inset-top, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100dvh; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  overflow: hidden;
  position: fixed;
}

/* ── MAP ── */
#map {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.leaflet-container { background: #080a10 !important; }
.leaflet-tile { filter: brightness(0.55) saturate(0.3) hue-rotate(195deg); }
.leaflet-control-zoom { display: none; }
.leaflet-control-attribution { display: none; }

/* ── TOP HUD ── */
#top-hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: calc(var(--safe-top) + 10px) 12px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(to bottom, #080a10ee 0%, transparent 100%);
  pointer-events: none;
}

#top-hud > * { pointer-events: all; }

.hud-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--accent), #00ccff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  flex-shrink: 0;
}

.hud-spacer { flex: 1; }

.hud-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  padding: 5px 10px;
  border-radius: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
}

.hud-pill.active { border-color: var(--accent); color: var(--accent); }
.hud-pill.warn   { border-color: var(--warning); color: var(--warning); }

.hud-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.hud-pill.active .hud-dot { animation: blink 1s infinite; }

#btn-profile {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* ── BOTTOM SHEET ── */
#bottom-sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 0 0 calc(var(--safe-bottom) + 8px);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 12px;
  cursor: pointer;
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 0 12px 12px;
  border-bottom: 1px solid var(--border);
}

.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 6px;
  text-align: center;
}

.stat-box .val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  line-height: 1;
  color: var(--accent);
}

.stat-box.red .val  { color: var(--accent2); }
.stat-box.blue .val { color: var(--accent3); }
.stat-box.gold .val { color: var(--warning); }

.stat-box .lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.5rem;
  color: var(--muted);
  margin-top: 2px;
  line-height: 1.2;
}

/* ── ACTION ROW ── */
.action-row {
  display: flex;
  gap: 10px;
  padding: 12px 12px 8px;
  align-items: center;
}

.btn-run {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-run.start { background: var(--accent); color: #000; }
.btn-run.stop  { background: transparent; color: var(--accent2); border: 1.5px solid var(--accent2); }
.btn-run:active { transform: scale(0.97); }
.btn-run:disabled { opacity: 0.35; }

.btn-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}

.btn-icon:active { background: var(--border); }

/* ── EXPANDED SHEET ── */
.sheet-extra {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.sheet-extra.open { max-height: 400px; }

/* ── ANTICHEAT BAR ── */
.ac-row {
  display: flex;
  gap: 6px;
  padding: 0 12px 10px;
  flex-wrap: wrap;
}

.ac-chip {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--accent);
  color: var(--accent);
}

.ac-chip.fail { border-color: var(--accent2); color: var(--accent2); }

/* ── LOG ── */
#run-log {
  max-height: 140px;
  overflow-y: auto;
  padding: 0 12px;
  scrollbar-width: none;
}

.log-entry {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  display: flex; gap: 6px; align-items: baseline;
}

.log-entry.s { color: var(--accent); }
.log-entry.e { color: var(--accent2); }
.log-entry.w { color: var(--warning); }
.log-entry.i { color: var(--accent3); }

/* ── LEADERBOARD DRAWER ── */
#leaderboard-drawer {
  position: absolute;
  top: 0; right: -100%;
  width: 88vw; max-width: 320px;
  bottom: 0;
  z-index: 200;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
  padding-top: var(--safe-top);
}

#leaderboard-drawer.open { right: 0; }

.drawer-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.drawer-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 3px;
  color: var(--accent);
}

.drawer-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

#lb-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  scrollbar-width: none;
}

.lb-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
}

.lb-rank {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  color: var(--muted);
  width: 24px;
  flex-shrink: 0;
  text-align: center;
}

.lb-rank.gold   { color: #ffd700; }
.lb-rank.silver { color: #c0c0c0; }
.lb-rank.bronze { color: #cd7f32; }

.lb-name {
  flex: 1;
  font-weight: 600;
  font-size: 0.9rem;
}

.lb-name.me { color: var(--accent); }

.lb-stats {
  text-align: right;
}

.lb-area {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--accent);
}

.lb-score {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
}

/* ── PROFILE DRAWER ── */
#profile-drawer {
  position: absolute;
  top: 0; left: -100%;
  width: 88vw; max-width: 320px;
  bottom: 0;
  z-index: 200;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
  padding-top: var(--safe-top);
}

#profile-drawer.open { left: 0; }

.profile-hero {
  padding: 24px 16px;
  background: linear-gradient(135deg, #00ff8810, transparent);
  border-bottom: 1px solid var(--border);
  text-align: center;
}

.profile-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #00aaff);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  color: #000;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
}

.profile-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 2px;
  color: var(--accent);
}

.profile-email {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
}

.profile-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 16px;
}

.ps-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.ps-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: var(--accent);
}

.ps-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  margin-top: 2px;
}

.btn-logout {
  margin: 0 16px 16px;
  padding: 13px;
  border-radius: 10px;
  border: 1px solid var(--accent2);
  background: transparent;
  color: var(--accent2);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-logout:active { background: var(--accent2); color: #fff; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  position: absolute; inset: 0;
  z-index: 150;
  background: #00000060;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.drawer-overlay.show { opacity: 1; pointer-events: all; }

/* ── TOAST ── */
#toast {
  position: absolute;
  bottom: 180px;
  left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--surface);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  padding: 10px 18px;
  border-radius: 20px;
  z-index: 300;
  opacity: 0;
  transition: all 0.25s;
  white-space: nowrap;
  pointer-events: none;
  max-width: 90vw;
}

#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err  { border-color: var(--accent2); color: var(--accent2); }

@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- OVERLAY (close drawers) -->
<div class="drawer-overlay" id="overlay" onclick="closeAllDrawers()"></div>

<!-- TOP HUD -->
<div id="top-hud">
  <button id="btn-profile" onclick="openProfile()">👤</button>
  <span class="hud-title">⬡ TR</span>
  <div class="hud-spacer"></div>
  <div class="hud-pill" id="status-pill">
    <div class="hud-dot"></div>
    <span id="status-text">IDLE</span>
  </div>
  <div class="hud-pill" id="online-pill" style="display:none">
    <div class="hud-dot" style="background:var(--accent3)"></div>
    <span id="online-count">0 online</span>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div id="bottom-sheet">
  <div class="sheet-handle" onclick="toggleSheet()"></div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="val" id="s-area">0.00</div>
      <div class="lbl">km²<br>AREA</div>
    </div>
    <div class="stat-box blue">
      <div class="val" id="s-dist">0.00</div>
      <div class="lbl">km<br>DIST</div>
    </div>
    <div class="stat-box gold">
      <div class="val" id="s-score">0</div>
      <div class="lbl">TOTAL<br>SCORE</div>
    </div>
    <div class="stat-box red">
      <div class="val" id="s-pace">–</div>
      <div class="lbl">MIN/KM<br>PACE</div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="action-row">
    <button class="btn-run start" id="btn-start" onclick="startRun()">▶ START</button>
    <button class="btn-run stop" id="btn-stop" onclick="stopRun()" disabled>■ STOP</button>
    <button class="btn-icon" onclick="openLeaderboard()" title="Leaderboard">🏆</button>
    <button class="btn-icon" onclick="centerMap()" title="Center">📍</button>
  </div>

  <!-- EXPANDED SECTION -->
  <div class="sheet-extra" id="sheet-extra">
    <div class="ac-row" id="ac-row">
      <div class="ac-chip" id="ac-spd">SPD ✓</div>
      <div class="ac-chip" id="ac-acc">ACC ✓</div>
      <div class="ac-chip" id="ac-gap">GAP ✓</div>
      <div class="ac-chip" id="ac-loop">LOOP ✓</div>
    </div>
    <div id="run-log"></div>
  </div>
</div>

<!-- LEADERBOARD DRAWER -->
<div id="leaderboard-drawer">
  <div class="drawer-header">
    <span class="drawer-title">🏆 LEADERBOARD</span>
    <button class="drawer-close" onclick="closeAllDrawers()">✕</button>
  </div>
  <div id="lb-list"><div style="padding:16px;font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">Loading…</div></div>
</div>

<!-- PROFILE DRAWER -->
<div id="profile-drawer">
  <div class="drawer-header">
    <span class="drawer-title">PROFILE</span>
    <button class="drawer-close" onclick="closeAllDrawers()">✕</button>
  </div>
  <div class="profile-hero">
    <div class="profile-avatar" id="p-avatar">?</div>
    <div class="profile-name" id="p-name">Runner</div>
    <div class="profile-email" id="p-email"></div>
  </div>
  <div class="profile-stats">
    <div class="ps-card"><div class="ps-val" id="p-area">0.00</div><div class="ps-lbl">km² Captured</div></div>
    <div class="ps-card"><div class="ps-val" id="p-dist">0.00</div><div class="ps-lbl">km Run</div></div>
    <div class="ps-card"><div class="ps-val" id="p-score">0</div><div class="ps-lbl">Total Score</div></div>
    <div class="ps-card"><div class="ps-val" id="p-terr">0</div><div class="ps-lbl">Territories</div></div>
  </div>
  <div style="flex:1"></div>
  <button class="btn-logout" onclick="doLogout()">LOGOUT</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════
     FIREBASE + GAME LOGIC
════════════════════════════════════════════════════ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">

// ┌─────────────────────────────────────────────────┐
// │  PASTE YOUR FIREBASE CONFIG HERE (same as auth) │
// └─────────────────────────────────────────────────┘
const firebaseConfig = {
  apiKey:            "PASTE_YOUR_API_KEY",
  authDomain:        "PASTE_YOUR_AUTH_DOMAIN",
  projectId:         "PASTE_YOUR_PROJECT_ID",
  storageBucket:     "PASTE_YOUR_STORAGE_BUCKET",
  messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
  appId:             "PASTE_YOUR_APP_ID",
};

import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc, setDoc, getDoc, updateDoc,
  onSnapshot, query, orderBy, limit, serverTimestamp, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── CONFIG ───────────────────────────────────────────
const CFG = {
  MIN_LOOP_AREA_M2: 5000,
  MIN_LOOP_PTS:     8,
  CLOSE_DIST_M:     25,
  MAX_SPEED_KMH:    30,
  MAX_ACC_M:        40,
  MAX_GAP_SEC:      15,
  GPS_SMOOTH:       3,
  SHIELD_LEVEL:     2,
};

// ── FIREBASE INIT ─────────────────────────────────────
const configured = firebaseConfig.apiKey !== "PASTE_YOUR_API_KEY";
let app, auth, db, currentUser, userProfile;

if (configured) {
  app  = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db   = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'auth.html'; return; }
    currentUser = user;
    await loadUserProfile(user.uid);
    renderProfile();
    subscribeToTerritories();
    subscribeToLeaderboard();
  });
} else {
  log('w', '⚠️', 'Firebase not configured — offline demo mode');
  currentUser = { uid: 'demo', email: 'demo@local' };
  userProfile = { username: 'DemoRunner', totalArea: 0, totalDist: 0, score: 0, territories: 0 };
  renderProfile();
}

// ── STATE ─────────────────────────────────────────────
const G = {
  running: false,
  watchId: null,
  rawPath: [],
  smoothedPath: [],
  myArea: 0,
  myDist: 0,
  myScore: 0,
  loopCount: 0,
  pendingBreak: null,
  anticheat: { spd:true, acc:true, gap:true, loop:true },
  territories: {},    // id → {owner, polygon, shield, area, layer, clipLayer?}
  unsubTerr: null,
  unsubLb: null,
};

// ── MAP ───────────────────────────────────────────────
const map = L.map('map', { zoomControl:false, attributionControl:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
map.setView([20, 0], 3);

const pathLayer  = L.layerGroup().addTo(map);
const polyLayer  = L.layerGroup().addTo(map);
let   pathLine   = null;
let   posMarker  = null;
let   myLastPos  = null;

// ═══════════════════════════════════════════════════
//  ANTI-CHEAT ENGINE
// ═══════════════════════════════════════════════════
function antiCheat(pt, prev) {
  const r = { ok:true };

  // Speed (device reported)
  if (pt.speed != null) {
    const kmh = pt.speed * 3.6;
    G.anticheat.spd = kmh <= CFG.MAX_SPEED_KMH;
    if (!G.anticheat.spd) { r.ok=false; r.reason=`Speed ${kmh.toFixed(0)} km/h`; }
  }

  // Accuracy
  G.anticheat.acc = pt.acc <= CFG.MAX_ACC_M;
  if (!G.anticheat.acc) { r.ok=false; r.reason=`Accuracy ${pt.acc.toFixed(0)}m`; }

  if (prev) {
    // Time gap
    const gap = (pt.t - prev.t) / 1000;
    G.anticheat.gap = gap <= CFG.MAX_GAP_SEC;
    if (!G.anticheat.gap) r.reason = `GPS gap ${gap.toFixed(0)}s`;

    // Derived speed
    const dist = haversine(prev, pt);
    const derivedKmh = gap > 0 ? (dist / gap) * 3.6 : 0;
    if (derivedKmh > CFG.MAX_SPEED_KMH && gap < 10) {
      G.anticheat.spd = false;
      r.ok = false;
      r.reason = `Derived speed ${derivedKmh.toFixed(0)} km/h`;
    }
  }

  updateACChips();
  return r;
}

function updateACChips() {
  const ac = G.anticheat;
  setBadge('ac-spd',  ac.spd,  'SPD');
  setBadge('ac-acc',  ac.acc,  'ACC');
  setBadge('ac-gap',  ac.gap,  'GAP');
  setBadge('ac-loop', ac.loop, 'LOOP');
}

function setBadge(id, ok, lbl) {
  const el = document.getElementById(id);
  el.textContent = ok ? `${lbl} ✓` : `${lbl} ✗`;
  el.className = ok ? 'ac-chip' : 'ac-chip fail';
}

// ═══════════════════════════════════════════════════
//  GEOMETRY ENGINE
// ═══════════════════════════════════════════════════
function haversine(a, b) {
  const R=6371000, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.asin(Math.sqrt(s));
}

function polygonArea(pts) {
  if (pts.length < 3) return 0;
  const o=pts[0], R=6371000;
  const toM = p => ({
    x: (p.lng-o.lng)*Math.PI/180*R*Math.cos(o.lat*Math.PI/180),
    y: (p.lat-o.lat)*Math.PI/180*R
  });
  const m = pts.map(toM);
  let a=0;
  for (let i=0,j=m.length-1; i<m.length; j=i++)
    a += (m[j].x+m[i].x)*(m[j].y-m[i].y);
  return Math.abs(a/2);
}

function pointInPolygon(pt, poly) {
  let inside=false;
  for (let i=0,j=poly.length-1; i<poly.length; j=i++) {
    const xi=poly[i].lng, yi=poly[i].lat, xj=poly[j].lng, yj=poly[j].lat;
    if (((yi>pt.lat)!==(yj>pt.lat)) && pt.lng < (xj-xi)*(pt.lat-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

// ── SUTHERLAND-HODGMAN CLIP ───────────────────────────
function clipPolygon(subject, clip) {
  if (!subject.length || !clip.length) return [];

  const inside = (p,a,b) =>
    (b.lng-a.lng)*(p.lat-a.lat) - (b.lat-a.lat)*(p.lng-a.lng) >= 0;

  const intersect = (a,b,c,d) => {
    const A1=b.lat-a.lat, B1=a.lng-b.lng, C1=A1*a.lng+B1*a.lat;
    const A2=d.lat-c.lat, B2=c.lng-d.lng, C2=A2*c.lng+B2*c.lat;
    const det = A1*B2-A2*B1;
    if (Math.abs(det)<1e-10) return null;
    return { lng:(C1*B2-C2*B1)/det, lat:(A1*C2-A2*C1)/det };
  };

  let out=[...subject];
  for (let i=0; i<clip.length; i++) {
    if (!out.length) return [];
    const inp=out; out=[];
    const eA=clip[i], eB=clip[(i+1)%clip.length];
    for (let j=0; j<inp.length; j++) {
      const cur=inp[j], prv=inp[(j+inp.length-1)%inp.length];
      if (inside(cur,eA,eB)) {
        if (!inside(prv,eA,eB)) { const p=intersect(prv,cur,eA,eB); if(p) out.push(p); }
        out.push(cur);
      } else if (inside(prv,eA,eB)) {
        const p=intersect(prv,cur,eA,eB); if(p) out.push(p);
      }
    }
  }
  return out;
}

// ── POLYGON BOOLEAN DIFFERENCE (A minus B) ────────────
// Clips A by the inverse of B — subtracts B from A.
// Strategy: Clip A against each edge of B in reverse winding.
function polygonDifference(subjectPoly, clipPoly) {
  // We reverse the clip polygon winding to get exterior clipping.
  // This is an approximation — full exact boolean difference requires
  // splitting subject at all intersections with clip edges.
  // For gameplay this is accurate enough.
  if (!subjectPoly.length || !clipPoly.length) return subjectPoly;

  // Check overlap at all
  const anyIn = clipPoly.some(p => pointInPolygon(p, subjectPoly));
  if (!anyIn) return subjectPoly;

  // Reversed clip = complement clipping
  const reversedClip = [...clipPoly].reverse();
  const clipped = clipPolygon(subjectPoly, reversedClip);

  // If clipping removed everything or gave degenerate result, return original
  return clipped.length >= 3 ? clipped : subjectPoly;
}

function polygonsOverlap(a, b) {
  return a.some(p => pointInPolygon(p, b)) || b.some(p => pointInPolygon(p, a));
}

function smoothPath(path) {
  const w=CFG.GPS_SMOOTH;
  return path.map((pt,i) => {
    const s=Math.max(0,i-Math.floor(w/2)), e=Math.min(path.length,s+w);
    const sl=path.slice(s,e);
    return { ...pt, lat:sl.reduce((a,p)=>a+p.lat,0)/sl.length, lng:sl.reduce((a,p)=>a+p.lng,0)/sl.length };
  });
}

// ═══════════════════════════════════════════════════
//  LOOP DETECTION
// ═══════════════════════════════════════════════════
function findLoop(path) {
  if (path.length < CFG.MIN_LOOP_PTS) return null;
  const tail = path[path.length-1];
  for (let i=0; i<path.length-CFG.MIN_LOOP_PTS; i++) {
    if (haversine(path[i], tail) < CFG.CLOSE_DIST_M) {
      const seg = path.slice(i);
      const area = polygonArea(seg);
      if (area >= CFG.MIN_LOOP_AREA_M2) return { polygon:seg, area, startIdx:i };
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════
//  SHIELD ENGINE
// ═══════════════════════════════════════════════════
function applyLoop(loopResult) {
  const newPoly = loopResult.polygon;
  const newArea = loopResult.area;

  const overlapping = Object.values(G.territories).filter(t =>
    polygonsOverlap(newPoly, t.polygon)
  );

  if (!overlapping.length) {
    captureNew(newPoly, newArea);
    return;
  }

  for (const t of overlapping) {
    if (t.owner === currentUser?.uid) {
      captureNew(newPoly, newArea, true);
      return;
    }
    if (t.shield >= 2) {
      if (!G.pendingBreak || G.pendingBreak.id !== t.id) {
        t.shield = 1;
        G.pendingBreak = { id:t.id };
        redrawTerritory(t);
        saveTerritory(t);
        log('w','🛡️','Shield cracked! Run same area again to steal.');
        toast('🛡️ Shield cracked! Run again to capture');
      } else {
        stealTerritory(t, newPoly, newArea);
        G.pendingBreak = null;
      }
    } else {
      stealTerritory(t, newPoly, newArea);
    }
  }
}

async function captureNew(polygon, area, merge=false) {
  const id = `terr_${currentUser?.uid}_${Date.now()}`;
  const t = { id, owner: currentUser?.uid, polygon, shield: CFG.SHIELD_LEVEL, area, layer:null };
  G.territories[id] = t;
  redrawTerritory(t);
  G.myArea += area/1e6;
  G.loopCount++;
  await saveTerritory(t);
  await updateUserStats();
  updateStatUI();
  log('s','✅',`Captured ${(area/1e6).toFixed(5)} km²`);
  toast(`Territory captured! +${(area/1e6).toFixed(4)} km²`);
}

async function stealTerritory(t, newPoly, newArea) {
  // Boolean difference: subtract new polygon from old territory
  const remaining = polygonDifference(t.polygon, newPoly);
  const remainingArea = remaining.length >= 3 ? polygonArea(remaining) : 0;
  const stolen = newArea;

  // Update old territory (shrunk)
  if (remainingArea < CFG.MIN_LOOP_AREA_M2) {
    // Completely eaten — delete it
    polyLayer.removeLayer(t.layer);
    delete G.territories[t.id];
    if (configured) await deleteDoc(doc(db, 'territories', t.id));
  } else {
    t.polygon = remaining;
    t.area    = remainingArea;
    t.owner   = currentUser?.uid;
    t.shield  = CFG.SHIELD_LEVEL;
    redrawTerritory(t);
    await saveTerritory(t);
  }

  // Capture new polygon for self
  await captureNew(newPoly, stolen);
  log('s','⚔️',`Stole territory! Remaining: ${(remainingArea/1e6).toFixed(5)} km²`);
  toast('⚔️ Territory stolen!');
}

// ═══════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════
function redrawTerritory(t) {
  if (t.layer) polyLayer.removeLayer(t.layer);
  const latlngs = t.polygon.map(p => [p.lat, p.lng]);
  const isMe = t.owner === currentUser?.uid;
  const color = isMe ? '#00ff88' : t.shield >= 2 ? '#3d7fff' : '#ff3d5a';
  const fill  = isMe ? '#00ff8828' : t.shield >= 2 ? '#3d7fff28' : '#ff3d5a28';
  t.layer = L.polygon(latlngs, {
    color, fillColor: fill,
    weight: 2, fillOpacity: 0.5,
    dashArray: t.shield === 1 ? '5,4' : null,
  }).addTo(polyLayer);
  const area = (t.area/1e6).toFixed(4);
  t.layer.bindPopup(`${isMe?'🟢 Mine':'🔴 Enemy'} · ${area} km² · 🛡️${t.shield}`);
}

function updatePath() {
  if (pathLine) pathLayer.removeLayer(pathLine);
  if (G.smoothedPath.length < 2) return;
  pathLine = L.polyline(G.smoothedPath.map(p=>[p.lat,p.lng]), {
    color:'#00ff88', weight:3, opacity:0.85
  }).addTo(pathLayer);
}

// ═══════════════════════════════════════════════════
//  GPS POSITION HANDLER
// ═══════════════════════════════════════════════════
function onPosition(pos) {
  const { latitude:lat, longitude:lng, accuracy:acc, speed } = pos.coords;
  const pt = { lat, lng, acc: acc||99, speed, t: pos.timestamp };
  const prev = G.rawPath[G.rawPath.length-1] || null;

  const ac = antiCheat(pt, prev);
  if (!ac.ok) { log('e','🚫',`BLOCKED: ${ac.reason}`); return; }

  G.rawPath.push(pt);
  G.smoothedPath = smoothPath(G.rawPath);

  if (prev) G.myDist += haversine(prev, pt)/1000;

  // Position marker
  if (!posMarker) {
    posMarker = L.circleMarker([lat,lng], { radius:9, color:'#00ff88', fillColor:'#00ff88', fillOpacity:1, weight:2 }).addTo(map);
    map.setView([lat,lng], 17);
  } else {
    posMarker.setLatLng([lat,lng]);
  }
  myLastPos = [lat, lng];

  updatePath();

  // Live speed UI
  const kmh = speed ? (speed*3.6) : 0;
  if (speed && speed > 0.5) {
    const paceMin = 60/(speed*3.6);
    const m=Math.floor(paceMin), s=Math.floor((paceMin-m)*60);
    document.getElementById('s-pace').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }

  // Loop detection
  const loopResult = findLoop(G.smoothedPath);
  if (loopResult) {
    G.anticheat.loop = true;
    updateACChips();
    log('i','🔄',`Loop! Area: ${(loopResult.area/1e6).toFixed(5)} km²`);
    applyLoop(loopResult);
    G.rawPath = G.rawPath.slice(loopResult.startIdx);
    G.smoothedPath = smoothPath(G.rawPath);
    document.getElementById('s-dist').textContent = G.myDist.toFixed(2);
  }

  updateStatUI();
}

// ═══════════════════════════════════════════════════
//  FIREBASE — TERRITORIES (REAL-TIME)
// ═══════════════════════════════════════════════════
function subscribeToTerritories() {
  if (!configured) return;
  const q = collection(db, 'territories');
  G.unsubTerr = onSnapshot(q, snap => {
    snap.docChanges().forEach(change => {
      const data = change.doc.data();
      const id   = change.doc.id;

      if (change.type === 'removed') {
        if (G.territories[id]?.layer) polyLayer.removeLayer(G.territories[id].layer);
        delete G.territories[id];
        return;
      }

      const polygon = data.coords.map(c => ({ lat:c.lat, lng:c.lng }));
      const existing = G.territories[id];

      if (existing) {
        existing.owner   = data.owner;
        existing.shield  = data.shield;
        existing.area    = data.area;
        existing.polygon = polygon;
        redrawTerritory(existing);
      } else {
        const t = { id, owner:data.owner, polygon, shield:data.shield, area:data.area, layer:null };
        G.territories[id] = t;
        redrawTerritory(t);
      }
    });
  });
}

async function saveTerritory(t) {
  if (!configured || !currentUser) return;
  await setDoc(doc(db, 'territories', t.id), {
    owner:     t.owner,
    coords:    t.polygon.map(p=>({lat:p.lat, lng:p.lng})),
    area:      t.area,
    shield:    t.shield,
    updatedAt: serverTimestamp(),
  });
}

// ═══════════════════════════════════════════════════
//  FIREBASE — LEADERBOARD
// ═══════════════════════════════════════════════════
function subscribeToLeaderboard() {
  if (!configured) return;
  const q = query(collection(db,'users'), orderBy('score','desc'), limit(20));
  G.unsubLb = onSnapshot(q, snap => {
    const list = document.getElementById('lb-list');
    list.innerHTML = '';
    snap.docs.forEach((d, i) => {
      const u = d.data();
      const isMe = d.id === currentUser?.uid;
      const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      list.innerHTML += `
        <div class="lb-row">
          <div class="lb-rank ${rankClass}">${i+1}</div>
          <div class="lb-name ${isMe?'me':''}">${u.username || 'Runner'}${isMe?' ★':''}</div>
          <div class="lb-stats">
            <div class="lb-area">${(u.totalArea||0).toFixed(4)} km²</div>
            <div class="lb-score">${u.score||0} pts</div>
          </div>
        </div>`;
    });
    if (!snap.docs.length) list.innerHTML = '<div style="padding:16px;font-family:\'DM Mono\',monospace;font-size:0.7rem;color:var(--muted)">No runners yet. Be first!</div>';
  });
}

// ── USER PROFILE ──────────────────────────────────────
async function loadUserProfile(uid) {
  if (!configured) return;
  const snap = await getDoc(doc(db, 'users', uid));
  if (snap.exists()) {
    userProfile = snap.data();
    G.myArea = userProfile.totalArea || 0;
    G.myDist = userProfile.totalDist || 0;
    G.myScore = userProfile.score || 0;
    updateStatUI();
  }
}

async function updateUserStats() {
  if (!configured || !currentUser) return;
  G.myScore = Math.round(G.myArea*1000 + G.myDist*10);
  await updateDoc(doc(db,'users',currentUser.uid), {
    totalArea:   G.myArea,
    totalDist:   G.myDist,
    score:       G.myScore,
    territories: G.loopCount,
  });
}

function renderProfile() {
  const u = userProfile || {};
  const name = u.username || 'Runner';
  document.getElementById('p-name').textContent    = name;
  document.getElementById('p-email').textContent   = currentUser?.email || '';
  document.getElementById('p-avatar').textContent  = name[0].toUpperCase();
  document.getElementById('p-area').textContent    = (u.totalArea||0).toFixed(4);
  document.getElementById('p-dist').textContent    = (u.totalDist||0).toFixed(2);
  document.getElementById('p-score').textContent   = u.score||0;
  document.getElementById('p-terr').textContent    = u.territories||0;
}

// ── CONTROLS ─────────────────────────────────────────
window.startRun = () => {
  if (!navigator.geolocation) { toast('GPS not available',true); return; }
  G.running=true; G.rawPath=[]; G.smoothedPath=[];
  pathLayer.clearLayers(); pathLine=null;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled  = false;
  setStatus('TRACKING', true);
  openSheet();
  log('i','🏃','Run started');
  G.watchId = navigator.geolocation.watchPosition(onPosition,
    e => { log('e','❌',`GPS: ${e.message}`); setStatus('GPS ERR',false,true); },
    { enableHighAccuracy:true, maximumAge:1000, timeout:10000 }
  );
};

window.stopRun = async () => {
  if (G.watchId) navigator.geolocation.clearWatch(G.watchId);
  G.running=false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
  setStatus('IDLE',false);
  await updateUserStats();
  log('i','🛑',`Done. ${G.myDist.toFixed(2)} km`);
};

window.doLogout = async () => {
  if (G.unsubTerr) G.unsubTerr();
  if (G.unsubLb)   G.unsubLb();
  if (configured) await signOut(auth);
  window.location.href = 'auth.html';
};

window.centerMap = () => {
  if (myLastPos) map.setView(myLastPos, 17, {animate:true});
};

// ── UI HELPERS ────────────────────────────────────────
function updateStatUI() {
  document.getElementById('s-area').textContent  = G.myArea.toFixed(4);
  document.getElementById('s-dist').textContent  = G.myDist.toFixed(2);
  G.myScore = Math.round(G.myArea*1000 + G.myDist*10);
  document.getElementById('s-score').textContent = G.myScore;
}

function setStatus(text, active, warn=false) {
  const pill = document.getElementById('status-pill');
  document.getElementById('status-text').textContent = text;
  pill.className = ['hud-pill', active?'active':'', warn?'warn':''].join(' ').trim();
}

let sheetOpen=false;
window.toggleSheet = () => {
  sheetOpen=!sheetOpen;
  document.getElementById('sheet-extra').className = sheetOpen ? 'sheet-extra open' : 'sheet-extra';
};

function openSheet() {
  sheetOpen=true;
  document.getElementById('sheet-extra').className='sheet-extra open';
}

window.openLeaderboard = () => {
  document.getElementById('leaderboard-drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
};

window.openProfile = () => {
  renderProfile();
  document.getElementById('profile-drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
};

window.closeAllDrawers = () => {
  document.getElementById('leaderboard-drawer').classList.remove('open');
  document.getElementById('profile-drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
};

let toastTimer;
window.toast = (msg, err=false) => {
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=err?'show err':'show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='',3000);
};

function log(type,icon,msg) {
  const el=document.createElement('div');
  el.className=`log-entry ${type}`;
  const t=new Date().toTimeString().slice(0,8);
  el.innerHTML=`<span>${icon}</span><span>[${t}] ${msg}</span>`;
  const logEl=document.getElementById('run-log');
  logEl.prepend(el);
  while(logEl.children.length>60) logEl.removeChild(logEl.lastChild);
}

// ── INIT ─────────────────────────────────────────────
log('i','⚡','Territory Runner 4B');
log('i','🔺','Polygon difference: Boolean subtraction');
log('i','🔥','Firebase: Real-time multiplayer');
log('i','🛡️',`Shield: Level ${CFG.SHIELD_LEVEL}`);
</script>
